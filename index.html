<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Baby Theo Runner</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#07111c; font-family:Arial, Helvetica, sans-serif; touch-action:none; }
    body { display:flex; align-items:center; justify-content:center; }
    #wrap { position:relative; width:min(100vw, calc(100vh * 0.6)); height:min(100vh, calc(100vw / 0.6)); background:#000; }
    canvas { width:100%; height:100%; display:block; background:#000; }
    #nameInput { display:none; position:absolute; left:50%; top:31%; transform:translate(-50%, -50%); width:70%; height:52px; border:3px solid #44a3ff; border-radius:12px; text-align:center; font-size:32px; font-weight:bold; text-transform:uppercase; color:#18222c; background:#f0f6fc; outline:none; z-index:3; }
    #loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:white; background:#07111c; text-align:center; padding:24px; z-index:4; font-size:20px; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="480" height="800"></canvas>
    <input id="nameInput" maxlength="10" autocomplete="off" />
    <div id="loading">Carregando Baby Theo Runner...</div>
  </div>
  <script src="js/game.js"></script>
</body>
</html>
